services:
  php:
    image: mklocke/liga-manager-api:${APP_TAG}
    pull_policy: never
    environment:
      - APP_BASE_URL=http://app.internal
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PASSWORD=123456
      - DB_PASSWORD_FILE=/run/secrets/db-password
      - DB_URL=${DB_DRIVER}://test@${DB_HOST}/test
      - EMAIL_SENDER_ADDRESS=noreply@example.com
      - EMAIL_SENDER_NAME=phpunit
      - EMAIL_URL=smtp://test:9ecd4875@maildev:1025?verify_peer=0
      - JWT_SECRET_FILE=/run/secrets/jwt-secret
      - LOG_LEVEL=info
      - LOG_PATH=/var/www/api/artifacts/app.log
      - REDIS_HOST=redis
    tmpfs:
      - /var/www/logos:mode=777
    volumes:
      - ${PWD}/build/artifacts:/var/www/api/artifacts
      - ${PWD}/tests:/var/www/api/tests
      - ${PWD}/vendor:/var/www/api/vendor
    secrets:
      - source: db-password
        target: db-password
      - source: jwt-secret
        target: jwt-secret
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "docker-php-healthcheck" ]
      start_period: 1m
      start_interval: 5s
      interval: 1m
      timeout: 5s
  mariadb:
    image: mariadb:${MARIADB_VERSION}
    environment:
      - MARIADB_ROOT_PASSWORD_FILE=/run/secrets/db-root-password
      - MARIADB_DATABASE=test
      - MARIADB_PASSWORD_FILE=/run/secrets/db-password
      - MARIADB_USER=test
    tmpfs:
      - /var/lib/mysql:mode=777
    secrets:
      - source: db-password
        target: db-password
      - source: db-root-password
        target: db-root-password
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      start_period: 1m
      start_interval: 5s
      interval: 1m
      timeout: 5s
  postgres:
    image: postgres:${POSTGRES_VERSION}-alpine
    tmpfs:
      - /var/lib/postgresql/data:mode=777
    secrets:
      - source: db-password
        target: db-password
      - source: db-root-password
        target: db-root-password
    environment:
      - POSTGRES_DB=test
      - POSTGRES_USER=test
      - POSTGRES_PASSWORD_FILE=/run/secrets/db-password
    healthcheck:
      test: ["CMD", "pg_isready", "--quiet", "--user", "test"]
      start_period: 1m
      start_interval: 5s
      interval: 1m
      timeout: 5s
  redis:
    image: redis:${REDIS_VERSION}-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "PING" ]
      start_period: 1m
      start_interval: 5s
      interval: 1m
      timeout: 5s
  maildev:
    image: maildev/maildev:latest
    environment:
      - MAILDEV_INCOMING_USER=test
      - MAILDEV_INCOMING_PASS=9ecd4875
    healthcheck:
      test: [ "CMD", "wget", "-O", '-', 'http://127.0.0.1:1080/healthz' ]
      start_period: 1m
      start_interval: 5s
      interval: 1m
      timeout: 5s
secrets:
  db-password:
    environment: DB_PASSWORD
  db-root-password:
    environment: DB_ROOT_PASSWORD
  jwt-secret:
    environment: JWT_SECRET
